name: Development Project Monitor

# Toronto workflow revision: 2026-07-17-xvfb-sync-v3.1

on:
  schedule:
    - cron: "17 9,16 * * *"
      timezone: "America/Toronto"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without sending notifications"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      reset_state:
        description: "Reset seen database before this manual run"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      diagnose_url:
        description: "Optional Toronto Application Details URL to diagnose without state"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: dev-project-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore monitor state
        uses: actions/cache@v5
        with:
          path: data/dev_project_monitor.sqlite3
          key: dev-project-monitor-state-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dev-project-monitor-state-${{ runner.os }}-

      - name: Restore Toronto browser profile
        uses: actions/cache@v5
        with:
          path: data/toronto_browser_profile
          key: toronto-browser-profile-v3-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-${{ github.run_id }}
          restore-keys: |
            toronto-browser-profile-v3-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-
            toronto-browser-profile-v3-${{ runner.os }}-

      - name: Reset monitor state for manual initial run
        if: github.event_name == 'workflow_dispatch' && inputs.reset_state == 'true'
        run: |
          rm -f data/dev_project_monitor.sqlite3
          echo "Monitor state reset for this manual run."

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run reconciliation tests
        run: python -m pytest -q

      - name: Install Chromium and OCR dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr xvfb
          python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '1' || '0' }}
          DIAGNOSE_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.diagnose_url || '' }}
        run: |
          echo "Toronto workflow revision: 2026-07-17-xvfb-sync-v3.1"
          mkdir -p data/toronto_debug data/toronto_browser_profile
          ARGS=(--config config.yml)
          if [ "$DRY_RUN" = "1" ]; then
            ARGS+=(--dry-run)
          fi
          if [ -n "$DIAGNOSE_URL" ]; then
            ARGS+=(--diagnose-url "$DIAGNOSE_URL")
          fi
          xvfb-run -a -s "-screen 0 1440x1000x24" python -m dev_project_monitor.monitor "${ARGS[@]}"

      - name: Upload Toronto diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toronto-debug-${{ github.run_id }}
          path: data/toronto_debug/
          if-no-files-found: ignore
          retention-days: 14
